spring.application.name=llm-queue

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/inhouse_queue
spring.datasource.username=arun.kumar
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# LLM
llm.base-url=https://maskedurl/llm
llm.auth-token=secret
llm.connect-timeout-seconds=10
llm.read-timeout-seconds=120

# Worker
worker.poll-interval-ms=1000
worker.prune-interval-ms=60000
worker.request-log-ttl-minutes=2

# Metrics scrape interval
metrics.scrape-interval-ms=5000

# Flex escalation — request dispatched as priority at this threshold
flex.escalation-seconds=9

# Priority thresholds are configured per-model via /admin/models (max_concurrent_requests, p95_threshold_seconds)
