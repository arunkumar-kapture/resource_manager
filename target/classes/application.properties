spring.application.name=llm-queue

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inhouse_queue}
spring.datasource.username=${DB_USERNAME:arun.kumar}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.max-active=20

# LLM
llm.base-url=${LLM_BASE_URL:https://maskedurl/llm}
llm.auth-token=${LLM_AUTH_TOKEN:secret}
llm.connect-timeout-seconds=10
llm.read-timeout-seconds=120

# Worker
worker.poll-interval-ms=1000

# Metrics scrape interval
metrics.scrape-interval-ms=5000

# Flex escalation - request dispatched as priority at this threshold
flex.escalation-seconds=9

# Graceful shutdown - allow in-flight requests to complete
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Virtual threads (Java 21) - makes blocking flex poll cheap
spring.threads.virtual.enabled=true

# Priority thresholds are configured per-model via /admin/models (max_concurrent_requests, p95_threshold_seconds)
